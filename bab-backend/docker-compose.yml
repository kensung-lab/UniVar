version: '3.8'

services:
  bab-backend:
    user: ${UID}:${GID}
    platform: 'linux/amd64'
    image: bab-backend:demo
    ports:
      - '${PORT}:8080'
    env_file:
      - .env
    volumes:
      - /tmp/202410255/upload:/usr/src/app/upload_data
      - ./sample:/usr/src/app/sample
      - ${UPLOAD_FILE_PATH}:${UPLOAD_FILE_PATH}
    networks:
      - bab_network
      - mongo_default

networks:
  bab_network:
    external: true
  mongo_default:
    external: true
